<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>J.A.R.V.I.S.</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800&family=JetBrains+Mono:wght@300;400;500;600&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #000000;
    --cyan: #4FD8F7;
    --cyan-bright: #9FF1FF;
    --cyan-dim: #1a4a57;
    --cyan-faint: #0d2630;
    --green: #5CFFA3;
    --amber: #ffb84f;
    --red: #ff5c5c;
    --line: #123642;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--cyan-bright);
    font-family: 'JetBrains Mono', monospace;
    overflow: hidden;
  }

  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: space-between;
    padding: 28px 20px;
    position: relative;
  }

  /* faint scanline / grid texture */
  body::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(var(--line) 1px, transparent 1px),
      linear-gradient(90deg, var(--line) 1px, transparent 1px);
    background-size: 42px 42px;
    opacity: 0.25;
    pointer-events: none;
    z-index: 0;
  }
  body::after {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      0deg, rgba(0,0,0,0) 0px, rgba(0,0,0,0) 2px,
      rgba(79,216,247,0.025) 3px, rgba(0,0,0,0) 4px
    );
    pointer-events: none;
    z-index: 0;
  }

  /* === CIRCUIT BACKGROUND (svg-like via css, behind orb) === */
  .circuit-layer {
    position: absolute;
    inset: 0;
    z-index: 0;
    pointer-events: none;
    opacity: 0.55;
  }
  .circuit-layer svg { width: 100%; height: 100%; }
  .circuit-line {
    fill: none;
    stroke: var(--cyan);
    stroke-width: 1;
    opacity: 0.35;
  }
  .circuit-node {
    fill: var(--cyan);
    opacity: 0.5;
  }
  .circuit-pulse {
    fill: none;
    stroke: var(--cyan-bright);
    stroke-width: 1.6;
    stroke-dasharray: 6 240;
    opacity: 0.9;
    animation: travel 7s linear infinite;
  }
  @keyframes travel {
    0% { stroke-dashoffset: 0; opacity: 0; }
    5% { opacity: 1; }
    90% { opacity: 1; }
    100% { stroke-dashoffset: -700; opacity: 0; }
  }

  .header {
    width: 100%;
    max-width: 640px;
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    z-index: 2;
  }

  .brand {
    font-family: 'Orbitron', sans-serif;
    font-size: 14px;
    letter-spacing: 0.32em;
    color: var(--cyan-bright);
    font-weight: 600;
    text-shadow: 0 0 12px rgba(79,216,247,0.6);
  }

  .clock {
    font-size: 12px;
    color: var(--cyan);
    letter-spacing: 0.08em;
    opacity: 0.8;
  }

  /* === ORB STAGE === */
  .orb-stage {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    z-index: 2;
  }

  .orb-wrap {
    position: relative;
    width: 260px;
    height: 260px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
  }

  /* outer dark halo ring like reference image */
  .halo {
    position: absolute;
    width: 260px;
    height: 260px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(20,60,70,0.5) 0%, rgba(0,0,0,0) 70%);
  }

  .ring {
    position: absolute;
    border-radius: 50%;
    border: 1px solid var(--cyan-dim);
    transition: border-color 0.5s ease, opacity 0.5s ease;
  }
  .ring--outer { width: 240px; height: 240px; border-style: dashed; opacity: 0.35; }
  .ring--mid   { width: 195px; height: 195px; opacity: 0.5; }
  .ring--tick  { width: 195px; height: 195px; opacity: 0.7; }

  /* tick marks ring using conic gradient mask trick */
  .ticks {
    position: absolute;
    width: 195px;
    height: 195px;
    border-radius: 50%;
    background: repeating-conic-gradient(
      var(--cyan) 0deg 1.2deg,
      transparent 1.2deg 9deg
    );
    -webkit-mask: radial-gradient(farthest-side, transparent calc(100% - 14px), #000 calc(100% - 13px), #000 100%, transparent 100%);
            mask: radial-gradient(farthest-side, transparent calc(100% - 14px), #000 calc(100% - 13px), #000 100%, transparent 100%);
    opacity: 0.5;
    animation: rotate-slow 40s linear infinite;
  }
  @keyframes rotate-slow {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }

  .orb {
    width: 132px;
    height: 132px;
    border-radius: 50%;
    background: radial-gradient(circle at 38% 32%, var(--cyan-dim), #061018 72%);
    box-shadow:
      0 0 50px -8px var(--cyan-dim),
      inset 0 0 30px rgba(0,0,0,0.7);
    position: relative;
    transition: all 0.5s cubic-bezier(.4,0,.2,1);
  }

  .orb::after {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 50%;
    background: radial-gradient(circle at 50% 50%, transparent 35%, rgba(0,0,0,0.5) 100%);
  }

  /* state: idle (subtle breathing) */
  .orb-wrap[data-state="idle"] .orb {
    animation: breathe 4s ease-in-out infinite;
  }
  @keyframes breathe {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.035); }
  }

  /* state: listening */
  .orb-wrap[data-state="listening"] .orb {
    background: radial-gradient(circle at 38% 32%, var(--green), #062017 72%);
    box-shadow: 0 0 70px -4px var(--green), inset 0 0 30px rgba(0,0,0,0.5);
    animation: pulse-listen 1.1s ease-in-out infinite;
  }
  .orb-wrap[data-state="listening"] .ring--mid,
  .orb-wrap[data-state="listening"] .ring--outer { border-color: var(--green); }
  .orb-wrap[data-state="listening"] .ticks { background: repeating-conic-gradient(var(--green) 0deg 1.2deg, transparent 1.2deg 9deg); animation-duration: 10s; }

  @keyframes pulse-listen {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.09); }
  }

  /* state: thinking */
  .orb-wrap[data-state="thinking"] .orb {
    background: radial-gradient(circle at 38% 32%, var(--cyan-bright), #06141c 72%);
    box-shadow: 0 0 60px -4px var(--cyan-bright);
    animation: spin-think 1.6s ease-in-out infinite;
  }
  @keyframes spin-think {
    0%, 100% { filter: brightness(0.95); }
    50% { filter: brightness(1.4); }
  }
  .orb-wrap[data-state="thinking"] .ticks { animation-duration: 3s; }

  /* state: speaking */
  .orb-wrap[data-state="speaking"] .orb {
    background: radial-gradient(circle at 38% 32%, var(--cyan-bright), #06141c 72%);
    box-shadow: 0 0 80px 0px var(--cyan);
    animation: speak 0.38s ease-in-out infinite alternate;
  }
  @keyframes speak {
    0% { transform: scale(1); }
    100% { transform: scale(1.07); }
  }
  .orb-wrap[data-state="speaking"] .ticks { animation-duration: 6s; }

  .status-label {
    position: absolute;
    bottom: -38px;
    font-size: 11px;
    letter-spacing: 0.24em;
    color: var(--cyan);
    text-transform: uppercase;
    white-space: nowrap;
    font-family: 'Orbitron', sans-serif;
    text-shadow: 0 0 8px rgba(79,216,247,0.5);
  }

  /* === TRANSCRIPT === */
  .console {
    width: 100%;
    max-width: 640px;
    min-height: 100px;
    z-index: 2;
    text-align: center;
    padding: 0 12px;
  }

  .heard {
    font-size: 13px;
    color: var(--cyan);
    opacity: 0.7;
    margin-bottom: 10px;
    min-height: 16px;
    font-style: italic;
  }

  .said {
    font-family: 'JetBrains Mono', monospace;
    font-size: 17px;
    line-height: 1.6;
    color: var(--cyan-bright);
    font-weight: 400;
    max-height: 160px;
    overflow-y: auto;
    text-shadow: 0 0 6px rgba(79,216,247,0.25);
  }
  .said::-webkit-scrollbar { width: 0; }

  .footer {
    width: 100%;
    max-width: 640px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
    z-index: 2;
  }

  .hint {
    font-size: 11px;
    color: var(--cyan);
    opacity: 0.6;
    letter-spacing: 0.05em;
    text-align: center;
  }

  .key {
    color: var(--cyan-bright);
    opacity: 1;
  }

  select {
    background: rgba(13,38,48,0.6);
    border: 1px solid var(--cyan-dim);
    color: var(--cyan);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    padding: 6px 10px;
    border-radius: 4px;
  }

  .error-banner {
    position: absolute;
    top: 70px;
    background: rgba(255, 92, 92, 0.1);
    border: 1px solid var(--red);
    color: #ff9d9d;
    font-size: 12px;
    padding: 10px 16px;
    border-radius: 6px;
    max-width: 500px;
    text-align: center;
    z-index: 3;
    display: none;
  }

  .boot-overlay {
    position: fixed;
    inset: 0;
    background: #000;
    z-index: 10;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: opacity 0.8s ease;
  }
  .boot-text {
    font-family: 'Orbitron', sans-serif;
    color: var(--cyan-bright);
    letter-spacing: 0.3em;
    font-size: 13px;
    text-align: center;
    opacity: 0.8;
    animation: blink-soft 1.6s ease-in-out infinite;
  }
  @keyframes blink-soft {
    0%, 100% { opacity: 0.4; }
    50% { opacity: 0.9; }
  }
</style>
</head>
<body>

  <!-- Tap-to-start overlay: browsers require a user gesture before audio can play -->
  <div class="boot-overlay" id="bootOverlay">
    <div class="boot-text">TOCÁ LA PANTALLA PARA INICIAR SISTEMAS</div>
  </div>

  <div class="circuit-layer">
    <svg viewBox="0 0 1000 600" preserveAspectRatio="xMidYMid slice">
      <path class="circuit-line" d="M0,80 L120,80 L150,110 L260,110 L290,140 L420,140"/>
      <path class="circuit-line" d="M1000,90 L880,90 L850,120 L720,120 L690,150 L560,150"/>
      <path class="circuit-line" d="M0,260 L100,260 L130,230 L240,230"/>
      <path class="circuit-line" d="M1000,270 L900,270 L870,300 L760,300"/>
      <path class="circuit-line" d="M0,440 L140,440 L170,470 L300,470"/>
      <path class="circuit-line" d="M1000,460 L860,460 L830,430 L700,430"/>
      <path class="circuit-line" d="M0,540 L200,540 L230,510 L380,510"/>
      <path class="circuit-line" d="M1000,540 L800,540 L770,510 L620,510"/>
      <circle class="circuit-node" cx="150" cy="110" r="3"/>
      <circle class="circuit-node" cx="290" cy="140" r="3"/>
      <circle class="circuit-node" cx="850" cy="120" r="3"/>
      <circle class="circuit-node" cx="130" cy="230" r="3"/>
      <circle class="circuit-node" cx="870" cy="300" r="3"/>
      <circle class="circuit-node" cx="170" cy="470" r="3"/>
      <circle class="circuit-node" cx="830" cy="430" r="3"/>
      <circle class="circuit-node" cx="230" cy="510" r="3"/>
      <circle class="circuit-node" cx="770" cy="510" r="3"/>
      <path class="circuit-pulse" d="M0,80 L120,80 L150,110 L260,110 L290,140 L420,140"/>
      <path class="circuit-pulse" d="M1000,460 L860,460 L830,430 L700,430" style="animation-delay: 2.4s;"/>
      <path class="circuit-pulse" d="M0,540 L200,540 L230,510 L380,510" style="animation-delay: 4.8s;"/>
    </svg>
  </div>

  <div class="header">
    <div class="brand">J · A · R · V · I · S</div>
    <div class="clock" id="clock">--:--:--</div>
  </div>

  <div class="error-banner" id="errorBanner"></div>

  <div class="orb-stage">
    <div class="orb-wrap" id="orbWrap" data-state="idle">
      <div class="halo"></div>
      <div class="ring ring--outer"></div>
      <div class="ring ring--mid"></div>
      <div class="ticks"></div>
      <div class="orb"></div>
      <div class="status-label" id="statusLabel">EN ESPERA · TOCÁ PARA HABLAR</div>
    </div>
  </div>

  <div class="console">
    <div class="heard" id="heard"></div>
    <div class="said" id="said">A sus órdenes. Tóque el núcleo o presione la barra espaciadora para comenzar.</div>
  </div>

  <div class="footer">
    <div class="hint"><span class="key">ESPACIO</span> para hablar · <span class="key">ESC</span> para detener</div>
    <select id="voiceSelect"></select>
  </div>

<script>
  const orbWrap = document.getElementById('orbWrap');
  const statusLabel = document.getElementById('statusLabel');
  const heardEl = document.getElementById('heard');
  const saidEl = document.getElementById('said');
  const clockEl = document.getElementById('clock');
  const errorBanner = document.getElementById('errorBanner');
  const voiceSelect = document.getElementById('voiceSelect');
  const bootOverlay = document.getElementById('bootOverlay');

  // ---- Clock ----
  function tickClock() {
    const now = new Date();
    clockEl.textContent = now.toLocaleTimeString('es-AR', { hour12: false });
  }
  setInterval(tickClock, 1000);
  tickClock();

  // ---- Boot sound: synth sweep + applause, generated via Web Audio API ----
  let audioCtx = null;

  function playBootSound() {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const now = audioCtx.currentTime;

    // --- Dramatic synth power-up sweep ---
    const osc1 = audioCtx.createOscillator();
    const osc2 = audioCtx.createOscillator();
    const gain1 = audioCtx.createGain();
    osc1.type = 'sawtooth';
    osc2.type = 'sine';
    osc1.frequency.setValueAtTime(60, now);
    osc1.frequency.exponentialRampToValueAtTime(880, now + 1.1);
    osc2.frequency.setValueAtTime(120, now);
    osc2.frequency.exponentialRampToValueAtTime(1760, now + 1.1);
    gain1.gain.setValueAtTime(0.0001, now);
    gain1.gain.exponentialRampToValueAtTime(0.22, now + 0.5);
    gain1.gain.exponentialRampToValueAtTime(0.0001, now + 1.3);

    const filter = audioCtx.createBiquadFilter();
    filter.type = 'lowpass';
    filter.frequency.setValueAtTime(400, now);
    filter.frequency.exponentialRampToValueAtTime(4000, now + 1.1);

    osc1.connect(filter);
    osc2.connect(filter);
    filter.connect(gain1);
    gain1.connect(audioCtx.destination);
    osc1.start(now);
    osc2.start(now);
    osc1.stop(now + 1.4);
    osc2.stop(now + 1.4);

    // --- Soft electronic "ping" accent ---
    const ping = audioCtx.createOscillator();
    const pingGain = audioCtx.createGain();
    ping.type = 'sine';
    ping.frequency.setValueAtTime(1760, now + 0.9);
    pingGain.gain.setValueAtTime(0.0001, now + 0.9);
    pingGain.gain.exponentialRampToValueAtTime(0.15, now + 0.95);
    pingGain.gain.exponentialRampToValueAtTime(0.0001, now + 1.6);
    ping.connect(pingGain);
    pingGain.connect(audioCtx.destination);
    ping.start(now + 0.9);
    ping.stop(now + 1.7);

    // --- Applause: layered filtered noise bursts ---
    const applauseStart = now + 1.0;
    const applauseDuration = 2.2;
    const bufferSize = audioCtx.sampleRate * applauseDuration;
    const noiseBuffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
    const data = noiseBuffer.getChannelData(0);

    // build a crowd-clap texture: random sparse clicks early, denser+softer later (like applause swell then settle)
    for (let i = 0; i < bufferSize; i++) {
      data[i] = 0;
    }
    const sampleRate = audioCtx.sampleRate;
    const numClaps = 140;
    for (let c = 0; c < numClaps; c++) {
      const t = Math.random() * applauseDuration;
      const idx = Math.floor(t * sampleRate);
      const clapLen = Math.floor(sampleRate * 0.012);
      const amp = 0.5 + Math.random() * 0.5;
      for (let j = 0; j < clapLen && idx + j < bufferSize; j++) {
        data[idx + j] += (Math.random() * 2 - 1) * amp * (1 - j / clapLen);
      }
    }

    const noiseSource = audioCtx.createBufferSource();
    noiseSource.buffer = noiseBuffer;

    const noiseFilter = audioCtx.createBiquadFilter();
    noiseFilter.type = 'bandpass';
    noiseFilter.frequency.value = 2200;
    noiseFilter.Q.value = 0.6;

    const applauseGain = audioCtx.createGain();
    applauseGain.gain.setValueAtTime(0.0001, applauseStart);
    applauseGain.gain.exponentialRampToValueAtTime(0.5, applauseStart + 0.5);
    applauseGain.gain.setValueAtTime(0.5, applauseStart + 1.1);
    applauseGain.gain.exponentialRampToValueAtTime(0.0001, applauseStart + applauseDuration);

    noiseSource.connect(noiseFilter);
    noiseFilter.connect(applauseGain);
    applauseGain.connect(audioCtx.destination);
    noiseSource.start(applauseStart);
    noiseSource.stop(applauseStart + applauseDuration);
  }

  // ---- Boot overlay: user gesture required to unlock audio on mobile ----
  bootOverlay.addEventListener('click', () => {
    bootOverlay.style.opacity = '0';
    setTimeout(() => bootOverlay.remove(), 800);
    try { playBootSound(); } catch (e) { console.warn('Audio no disponible', e); }
    setTimeout(() => {
      const greeting = 'Sistemas en línea. Buen día, señor. ¿En qué puedo asistirlo?';
      saidEl.textContent = greeting;
    }, 1400);
  }, { once: true });

  // ---- State machine ----
  function setState(state, label) {
    orbWrap.dataset.state = state;
    statusLabel.textContent = label;
  }

  function showError(msg) {
    errorBanner.textContent = msg;
    errorBanner.style.display = 'block';
    setTimeout(() => errorBanner.style.display = 'none', 4500);
  }

  // ---- Speech Recognition ----
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  const synth = window.speechSynthesis;
  let recognition = null;
  let isListening = false;

  if (SpeechRecognition) {
    recognition = new SpeechRecognition();
    recognition.lang = 'es-AR';
    recognition.continuous = false;
    recognition.interimResults = true;

    recognition.onstart = () => {
      isListening = true;
      setState('listening', 'ESCUCHANDO');
      heardEl.textContent = '';
    };

    recognition.onresult = (event) => {
      let transcript = '';
      for (let i = event.resultIndex; i < event.results.length; i++) {
        transcript += event.results[i][0].transcript;
      }
      heardEl.textContent = transcript;
      if (event.results[event.results.length - 1].isFinal) {
        handleUserSpeech(transcript);
      }
    };

    recognition.onerror = (event) => {
      isListening = false;
      if (event.error === 'no-speech') {
        setState('idle', 'EN ESPERA · TOCÁ PARA HABLAR');
      } else if (event.error === 'not-allowed') {
        showError('Acceso al micrófono denegado. Habilítalo en la configuración del navegador.');
        setState('idle', 'EN ESPERA · TOCÁ PARA HABLAR');
      } else {
        showError('Error de reconocimiento: ' + event.error);
        setState('idle', 'EN ESPERA · TOCÁ PARA HABLAR');
      }
    };

    recognition.onend = () => {
      isListening = false;
      if (orbWrap.dataset.state === 'listening') {
        setState('idle', 'EN ESPERA · TOCÁ PARA HABLAR');
      }
    };
  } else {
    showError('Tu navegador no soporta reconocimiento de voz. Probá con Chrome o Edge.');
  }

  function startListening() {
    if (!recognition) return;
    if (synth && synth.speaking) {
      synth.cancel();
    }
    try {
      recognition.start();
    } catch (e) {
      // already started
    }
  }

  function stopListening() {
    if (recognition && isListening) recognition.stop();
    if (synth) synth.cancel();
    setState('idle', 'EN ESPERA · TOCÁ PARA HABLAR');
  }

  // ---- Conversation memory ----
  let conversationHistory = [];

  const SYSTEM_PROMPT = `Sos J.A.R.V.I.S., el asistente de inteligencia artificial personal de Rubén, un coordinador de sucursal en una cadena de farmacias en Mendoza, Argentina. Tu personalidad:
- Hablás en español rioplatense (vos, no tú), con un tono de mayordomo británico elegante pero cálido — formal sin ser frío, con un toque de ingenio seco.
- Te dirigís a él como "señor" ocasionalmente, no en cada oración.
- Sos extremadamente competente, conciso y directo. Nada de relleno innecesario.
- Tenés un sentido del humor sutil, nunca payasesco.
- Tus respuestas son CORTAS porque se leen en voz alta — 1 a 3 oraciones salvo que te pidan explícitamente más detalle.
- No usás emojis, asteriscos, ni formato markdown — esto se convierte directamente a voz.
- Si no sabés algo o no podés hacer algo (no tenés acceso a internet en tiempo real, no podés controlar dispositivos reales), decilo con elegancia, no te disculpes en exceso.`;

  async function handleUserSpeech(text) {
    if (!text.trim()) {
      setState('idle', 'EN ESPERA · TOCÁ PARA HABLAR');
      return;
    }
    setState('thinking', 'PROCESANDO');
    conversationHistory.push({ role: 'user', content: text });

    try {
      const response = await fetch("/.netlify/functions/jarvis", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          system: SYSTEM_PROMPT,
          messages: conversationHistory
        })
      });

      const data = await response.json();

      if (!response.ok) {
        throw new Error(data.error || 'Error desconocido del servidor');
      }

      const reply = data.reply;

      conversationHistory.push({ role: 'assistant', content: reply });
      // keep history manageable
      if (conversationHistory.length > 20) {
        conversationHistory = conversationHistory.slice(-20);
      }

      saidEl.textContent = reply;
      speak(reply);
    } catch (err) {
      console.error(err);
      showError('Error de conexión con el núcleo de IA.');
      setState('idle', 'EN ESPERA · TOCÁ PARA HABLAR');
    }
  }

  // ---- Speech Synthesis ----
  let voices = [];
  function loadVoices() {
    if (!synth) return;
    voices = synth.getVoices();
    const spanishVoices = voices.filter(v => v.lang.startsWith('es'));
    const list = spanishVoices.length ? spanishVoices : voices;

    voiceSelect.innerHTML = '';
    list.forEach((v, i) => {
      const opt = document.createElement('option');
      opt.value = voices.indexOf(v);
      opt.textContent = `${v.name} (${v.lang})`;
      voiceSelect.appendChild(opt);
    });

    // Prefer a male-ish Spanish voice if available, else first es voice
    const preferred = spanishVoices.find(v => /male|jorge|diego|carlos/i.test(v.name)) || spanishVoices[0];
    if (preferred) voiceSelect.value = voices.indexOf(preferred);
  }
  if (synth) {
    synth.onvoiceschanged = loadVoices;
  }
  loadVoices();

  function speak(text) {
    if (!synth) {
      setState('idle', 'EN ESPERA · TOCÁ PARA HABLAR');
      return;
    }
    synth.cancel();
    const utter = new SpeechSynthesisUtterance(text);
    const selectedIdx = voiceSelect.value;
    if (selectedIdx !== '' && voices[selectedIdx]) {
      utter.voice = voices[selectedIdx];
      utter.lang = voices[selectedIdx].lang;
    } else {
      utter.lang = 'es-AR';
    }
    utter.rate = 1.02;
    utter.pitch = 0.95;

    utter.onstart = () => setState('speaking', 'RESPONDIENDO');
    utter.onend = () => setState('idle', 'EN ESPERA · TOCÁ PARA HABLAR');
    utter.onerror = () => setState('idle', 'EN ESPERA · TOCÁ PARA HABLAR');

    synth.speak(utter);
  }

  // ---- Interactions ----
  orbWrap.addEventListener('click', () => {
    if (isListening) {
      stopListening();
    } else if (orbWrap.dataset.state === 'idle') {
      startListening();
    } else if (orbWrap.dataset.state === 'speaking') {
      if (synth) synth.cancel();
      setState('idle', 'EN ESPERA · TOCÁ PARA HABLAR');
    }
  });

  document.addEventListener('keydown', (e) => {
    if (e.code === 'Space' && !isListening) {
      e.preventDefault();
      startListening();
    } else if (e.code === 'Escape') {
      stopListening();
    }
  });
</script>

</body>
</html>
